<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="游戏服务器列表，包含Minecraft、Terraria等游戏服务器" />
    <title>服务器列表</title>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/server.css" />
    <script defer src="scripts/site-header.js"></script>
</head>

<body>
    <site-header active="server" variant="default"></site-header>
    <main class="section-server">
        <nav class="center">
            <div id="minecraft">
                <img src="images/minecraft.svg" alt="Minecraft" loading="lazy" />
            </div>
            <div id="terraria">
                <img src="images/terraria.png" alt="Terraria" height="20%" loading="lazy" />
            </div>
            <div id="pz">
                <img src="images/pz.ico" alt="Project Zomboid" loading="lazy" />
            </div>
            <div id="sdtd">
                <img src="images/sdtd.ico" alt="暂未开放: 7 Days to Die" loading="lazy" />
            </div>
            <div id="stardew">
                <img src="images/stardew.ico" alt="暂未开放: Stardew Valley" height="80px" loading="lazy" />
            </div>
        </nav>
    </main>
</body>

</html>
